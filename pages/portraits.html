<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portraits | Irick Images</title>
    <link rel="icon" href="/site-icon.webp" />
    <meta name="theme-color" content="#000000" />
    <meta name="author" content="Irick Images" />
    <meta
      name="description"
      content="Portrait photography by Irick Images — natural light and studio sessions in Greenville, SC."
    />
    <meta property="og:title" content="Portraits | Irick Images" />
    <meta
      property="og:description"
      content="Portrait photography by Irick Images."
    />
    <meta property="og:image" content="/portraits/DANIEL2.webp" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="stylesheet" href="/globals.css" />
    <link rel="stylesheet" href="/css/transition.css" />
    <link rel="stylesheet" href="/css/menu.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/portraits.css" />
    <link rel="stylesheet" href="/css/pixelated-text.css" />
    <link rel="stylesheet" href="/css/footer.css" />
  </head>
  <body>
    <!-- page transition -->
    <div class="transition">
      <div class="transition-overlay"></div>
    </div>

    <!-- menu -->
    <site-navbar></site-navbar>

    <!-- film: banner section -->
    <section class="banner film-banner">
      <div class="banner-img" data-parallax="true" data-parallax-speed="0.2">
        <picture>
          <source media="(max-width: 1000px)" srcset="/portraits/EDIT10.webp" />
          <img src="/portraits/EDIT26.webp" alt="" loading="lazy" />
        </picture>
      </div>

      <div class="banner-content">
        <div class="container">
          <div class="banner-header">
            <h2>Vision by</h2>
            <h2>Justin Irick</h2>
            <p>[ &nbsp;Scroll for more&nbsp; ]</p>
          </div>
        </div>
      </div>
    </section>

    <!-- film: snapshots section -->
    <section class="film-snapshots">
      <div class="container">
        <div class="snap-row">
          <div class="snap-img"></div>
          <div class="snap-img"></div>
          <div class="snap-img img-1"></div>
        </div>

        <div class="snap-row">
          <div class="snap-img img-2"></div>
          <div class="snap-img"></div>
          <div class="snap-img"></div>
        </div>

        <div class="snap-row">
          <div class="snap-img"></div>
          <div class="snap-img img-3"></div>
          <div class="snap-img img-4"></div>
        </div>

        <div class="snap-row">
          <div class="snap-img img-5"></div>
          <div class="snap-img"></div>
          <div class="snap-img"></div>
        </div>

        <div class="snap-row">
          <div class="snap-img"></div>
          <div class="snap-img"></div>
          <div class="snap-img img-6"></div>
        </div>
      </div>
    </section>

    <!-- footer -->
    <site-footer></site-footer>

    <script type="module" src="/scripts/footer-component.js"></script>
    <script type="module" src="/scripts/lenis-scroll.js"></script>
    <script type="module" src="/scripts/navbar-component.js"></script>
    <script type="module" src="/scripts/menu.js"></script>
    <script type="module" src="/scripts/portfolio-loader.js"></script>
    <script type="module" src="/scripts/portraits.js"></script>
    <script type="module" src="/scripts/parallax.js"></script>
    <script type="module" src="/scripts/transition.js"></script>
  </body>
</html>
