[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Supabase anon keys are designed to be public (RLS protects data).
# Vite inlines VITE_ env vars into client bundles by design.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_URL"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# Clean URLs — map routes to built HTML pages
[[redirects]]
  from = "/work"
  to = "/pages/work.html"
  status = 200

